---
name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test with Gradle
        run: ./gradlew test

      - name: Build Release (APK & AAB)
        run: ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease --stacktrace

      - name: Sign APK and AAB Artifacts
        run: |
          # 1. Decode keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

          # 2. Locate unsigned files
          unsigned_apk=$(find androidApp/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          unsigned_aab=$(find androidApp/build/outputs/bundle/release/ -name "*.aab" | head -n 1)

          if [ -z "$unsigned_apk" ]; then
            echo "Error: Unsigned APK not found!"
            exit 1
          fi
          if [ -z "$unsigned_aab" ]; then
            echo "Error: Unsigned AAB not found!"
            exit 1
          fi

          echo "Found unsigned APK: $unsigned_apk"
          echo "Found unsigned AAB: $unsigned_aab"

          # 3. Sign APK using apksigner
          apksigner_path=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -n 1)
          echo "Using apksigner at: $apksigner_path"
          $apksigner_path sign --ks release.keystore \
            --ks-key-alias "${{ secrets.ALIAS_NAME }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASS }}" \
            --key-pass pass:"${{ secrets.ALIAS_PASS }}" \
            --out ./doc-scanner-${{ github.ref_name }}.apk \
            "$unsigned_apk"

          # 4. Sign AAB using jarsigner
          echo "Signing AAB..."
          cp "$unsigned_aab" ./doc-scanner-${{ github.ref_name }}.aab
          jarsigner -keystore release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASS }}" \
            -keypass "${{ secrets.ALIAS_PASS }}" \
            ./doc-scanner-${{ github.ref_name }}.aab \
            "${{ secrets.ALIAS_NAME }}"

          # 5. Verify APK
          $apksigner_path verify ./doc-scanner-${{ github.ref_name }}.apk

          # Clean up local keystore file
          rm -f release.keystore

      - name: Create Release and Upload Artifacts
        run: |
          gh release create "${{ github.ref_name }}" \
            ./doc-scanner-${{ github.ref_name }}.apk \
            ./doc-scanner-${{ github.ref_name }}.aab \
            --draft \
            --prerelease \
            --title "Release ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            || gh release upload "${{ github.ref_name }}" \
            ./doc-scanner-${{ github.ref_name }}.apk \
            ./doc-scanner-${{ github.ref_name }}.aab \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
