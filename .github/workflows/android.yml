name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test with Gradle
        run: ./gradlew test

      - name: Build Release (APK & AAB)
        run: ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease --stacktrace

      - name: Prepare signing directory
        run: |
          mkdir -p release-artifacts
          cp androidApp/build/outputs/apk/release/*.apk release-artifacts/
          cp androidApp/build/outputs/bundle/release/*.aab release-artifacts/

      - name: Sign Release Artifacts (APK & AAB)
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: release-artifacts
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ALIAS_NAME }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASS }}
          keyPassword: ${{ secrets.ALIAS_PASS }}
        env:
          BUILD_TOOLS_VERSION: "37.0.0"

      - name: Locate and Rename Signed Artifacts
        run: |
          APK_PATH=$(find release-artifacts/ -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          AAB_PATH=$(find release-artifacts/ -name "*.aab" ! -name "*-unsigned.aab" | head -n 1)

          if [ -z "$APK_PATH" ]; then
            echo "Error: Signed APK not found!"
            exit 1
          fi
          if [ -z "$AAB_PATH" ]; then
            echo "Error: Signed AAB not found!"
            exit 1
          fi

          echo "Found signed APK: $APK_PATH"
          echo "Found signed AAB: $AAB_PATH"

          cp "$APK_PATH" ./doc-scanner-${{ github.ref_name }}.apk
          cp "$AAB_PATH" ./doc-scanner-${{ github.ref_name }}.aab

      - name: Upload APK to Release
        uses: svenstaro/upload-release-action@v2
        with:
          file: ./doc-scanner-${{ github.ref_name }}.apk
          asset_name: doc-scanner-${{ github.ref_name }}.apk
          overwrite: true
          prerelease: true
          draft: true
          body: "Release ${{ github.ref_name }}"

      - name: Upload App Bundle (AAB) to Release
        uses: svenstaro/upload-release-action@v2
        with:
          file: ./doc-scanner-${{ github.ref_name }}.aab
          asset_name: doc-scanner-${{ github.ref_name }}.aab
          overwrite: true
          prerelease: true
          draft: true
          body: "Release ${{ github.ref_name }}"
