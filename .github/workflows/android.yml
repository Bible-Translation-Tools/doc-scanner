name: Android Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Test with Gradle
        run: ./gradlew test

      - name: Build Release (APK & AAB)
        run: ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease --stacktrace

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: androidApp/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ALIAS_NAME }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASS }}
          keyPassword: ${{ secrets.ALIAS_PASS }}
        env:
          BUILD_TOOLS_VERSION: "37.0.0"

      - name: Sign App Bundle (AAB)
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: androidApp/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ALIAS_NAME }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASS }}
          keyPassword: ${{ secrets.ALIAS_PASS }}
        env:
          BUILD_TOOLS_VERSION: "37.0.0"

      - name: Upload APK to Release
        uses: svenstaro/upload-release-action@v2
        with:
          file: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          asset_name: doc-scanner-${{ github.ref_name }}.apk
          overwrite: true
          prerelease: true
          draft: true
          body: "Release ${{ github.ref_name }}"

      - name: Upload App Bundle (AAB) to Release
        uses: svenstaro/upload-release-action@v2
        with:
          file: ${{ steps.sign_aab.outputs.signedReleaseFile }}
          asset_name: doc-scanner-${{ github.ref_name }}.aab
          overwrite: true
          prerelease: true
          draft: true
          body: "Release ${{ github.ref_name }}"
