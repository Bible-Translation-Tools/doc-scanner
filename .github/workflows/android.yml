---
name: Android Release

on:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set Build Secrets
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          UPLOAD_ALIAS_NAME: "op://DevOps/Play-store-upload-key/alias-name"
          UPLOAD_ALIAS_PASS: "op://DevOps/Play-store-upload-key/alias-password"
          UPLOAD_KEYSTORE_PASS: "op://DevOps/Play-store-upload-key/keystore-password"
          UPLOAD_KEYSTORE_BASE64: "op://DevOps/Play-store-upload-key/keystore-base64"

      - name: set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read app version
        id: app_version
        run: |
          VERSION_NAME=$(grep -E '^app-versionName' gradle/libs.versions.toml | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep -E '^app-versionCode' gradle/libs.versions.toml | sed -E 's/.*"([^"]+)".*/\1/')
          ARTIFACT_BASE="doc-scanner-${VERSION_NAME}+${{ github.run_number }}-v${VERSION_CODE}-android"
          echo "ARTIFACT_BASE=$ARTIFACT_BASE" >> "$GITHUB_ENV"
          echo "Artifact base name: $ARTIFACT_BASE"

      - name: Test with Gradle
        run: ./gradlew test

      - name: Build Release (APK & AAB)
        run: ./gradlew :androidApp:assembleRelease :androidApp:bundleRelease --stacktrace

      - name: Sign APK Release Artifacts
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: androidApp/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ALIAS_NAME }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASS }}
          keyPassword: ${{ secrets.ALIAS_PASS }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Sign AAB Release Artifacts
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: androidApp/build/outputs/bundle/release
          signingKeyBase64: ${{ env.UPLOAD_KEYSTORE_BASE64 }}
          alias: ${{ env.UPLOAD_ALIAS_NAME }}
          keyStorePassword: ${{ env.UPLOAD_KEYSTORE_PASS }}
          keyPassword: ${{ env.UPLOAD_ALIAS_PASS }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Locate and Rename Signed Artifacts
        run: |
          APK_PATH="${{ steps.sign_apk.outputs.signedReleaseFile }}"
          AAB_PATH="${{ steps.sign_aab.outputs.signedReleaseFile }}"

          if [ -z "$APK_PATH" ]; then
            echo "Error: Signed APK not found via Action outputs!"
            exit 1
          fi
          if [ -z "$AAB_PATH" ]; then
            echo "Error: Signed AAB not found via Action outputs!"
            exit 1
          fi

          echo "Found signed APK: $APK_PATH"
          echo "Found signed AAB: $AAB_PATH"

          cp "$APK_PATH" "./${ARTIFACT_BASE}.apk"
          cp "$AAB_PATH" "./${ARTIFACT_BASE}.aab"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_BASE }}
          path: |
            ./${{ env.ARTIFACT_BASE }}.apk
            ./${{ env.ARTIFACT_BASE }}.aab
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --prerelease \
            --title "Release ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}" \
            || echo "Release already exists"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Asset
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release upload "${{ github.ref_name }}" \
            "./${ARTIFACT_BASE}.apk" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AAB Asset
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release upload "${{ github.ref_name }}" \
            "./${ARTIFACT_BASE}.aab" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
